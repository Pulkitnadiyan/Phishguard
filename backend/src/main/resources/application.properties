spring.application.name=phishguard-backend
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/phishguard_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ML Service URL
ml.service.url=https://pulkitnadiyan-phishguard-ml.hf.space/predict

# Logging
logging.file.name=backend.log
